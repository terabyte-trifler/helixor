name: Day 13 Hardening + Integration

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 5 * * *"   # nightly at 05:00 UTC

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults: { run: { working-directory: helixor-integration } }

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     helixor
          POSTGRES_PASSWORD: helixor
          POSTGRES_DB:       helixor
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U helixor -d helixor"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      HELIXOR_API_URL:      http://localhost:8001
      HELIXOR_PROGRAM_ID:   ${{ secrets.HELIXOR_DEVNET_PROGRAM_ID }}
      DATABASE_URL:         postgresql://helixor:helixor@localhost:5432/helixor
      SOLANA_RPC_URL:       ${{ secrets.HELIXOR_DEVNET_RPC_URL }}
      ORACLE_KEYPAIR_PATH:  ${{ github.workspace }}/keys/oracle-node.json
      HELIXOR_ORACLE_DIR:   ../helixor-oracle
      HELIXOR_PROGRAMS_DIR: ../helixor-programs
      # Skip on-chain on PRs without devnet access
      HELIXOR_SKIP_ONCHAIN: ${{ github.event_name == 'pull_request' && '1' || '0' }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet

      - name: Restore oracle keypair
        run: |
          mkdir -p ${{ github.workspace }}/keys
          echo '${{ secrets.HELIXOR_DEVNET_ORACLE_KEYPAIR }}' \
            > ${{ github.workspace }}/keys/oracle-node.json

      - name: Apply DB migrations
        working-directory: helixor-oracle
        run: |
          for sql in db/schema.sql db/migrations/*.sql; do
            PGPASSWORD=helixor psql -h localhost -U helixor -d helixor -f "$sql"
          done

      - name: Install Python deps + start API
        working-directory: helixor-oracle
        run: |
          pip install -r requirements.txt
          uvicorn api.main:app --host 0.0.0.0 --port 8001 &
          sleep 5

      - name: Install integration deps
        run: npm ci

      - name: Run hardening + tests
        run: npm run harden:all
