[package]
name        = "health-oracle"
version     = "0.3.0"
edition     = "2021"
description = "Phylanx V2 health-oracle — Day 3 adds commit_baseline + registration migration"

[lib]
crate-type = ["cdylib", "lib"]
name       = "health_oracle"

[features]
default      = []
no-entrypoint = []
no-idl        = []
no-log-ix-name = []
cpi          = ["no-entrypoint"]
idl-build    = ["anchor-lang/idl-build", "certificate-issuer/idl-build"]

[dependencies]
anchor-lang = "1.0.2"
# Day 19: health-oracle CPI-calls certificate_issuer.issue_certificate.
# The `cpi` feature pulls in the callee's auto-generated CPI module
# without its entrypoint (no-entrypoint), so it links as a library.
certificate-issuer = { path = "../certificate-issuer", features = ["cpi"] }
solana-instructions-sysvar = "3.0.1"
# AW-01-EXT: the SlotHashes sysvar pubkey is pinned at the Anchor account
# layer via `address = solana_program::sysvar::slot_hashes::ID` (the
# certificate-issuer re-verifies it inside `verify_slot_anchor`).
solana-program = "3.0.0"
# AW-02: the Ed25519 program id, used by advance_epoch to recognise the
# precompile instructions carrying the cluster M-of-N attestations.
solana-sdk-ids = "3.1.0"
