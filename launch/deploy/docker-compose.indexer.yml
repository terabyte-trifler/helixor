# =============================================================================
# launch/deploy/docker-compose.indexer.yml
#
# Day 30 — deploy the phylanx-indexer side of the stack: Kafka broker,
# TimescaleDB, the indexer process itself, and a Prometheus scrape
# endpoint.
#
# Targets a single-region indexer deployment. Cross-region replication of
# the indexer is out-of-scope for V2 (the on-chain certs are the source
# of truth; the indexer is an accelerated read path).
#
# USAGE
# -----
#   cp .env.example .env             # populate secrets
#   docker compose -f launch/deploy/docker-compose.indexer.yml up -d
#
# The compose file pins versions explicitly — no `latest` tags — so a
# fresh stand-up reproduces the audited environment.
# =============================================================================

version: "3.9"

services:

  # ── TimescaleDB — the indexer's hypertable store ──────────────────────────
  timescaledb:
    image: timescale/timescaledb:2.14.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       phylanx
      POSTGRES_USER:     phylanx_indexer
      POSTGRES_PASSWORD: "${TIMESCALE_PASSWORD:?TIMESCALE_PASSWORD must be set}"
      # Tuning — sized for the load test target of 50M rows.
      TIMESCALEDB_TELEMETRY: "off"
    volumes:
      - tsdb_data:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phylanx_indexer -d phylanx"]
      interval: 10s
      timeout:  5s
      retries:  5
    # VULN-17: bind to 127.0.0.1 only. Other compose services reach the
    # database via the `timescaledb` hostname inside the docker network;
    # the host port is for the operator's `psql` console, not the world.
    ports:
      - "127.0.0.1:5432:5432"
    mem_limit: 4g
    cpus: "2.0"

  # ── Kafka — the agent.transactions event bus ──────────────────────────────
  # VULN-17: the dev broker is brought up with SASL_PLAINTEXT so the
  # SASL handshake is exercised end-to-end. The same image switches to
  # SASL_SSL in production via the overrides documented in
  # launch/RUNBOOK.md — production must NOT use SASL_PLAINTEXT.
  # The KAFKA_SASL_* values are loaded from the .env file (template at
  # launch/deploy/.env.example); they must be set, never defaulted.
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: SASL_PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      # VULN-17: the broker requires a SASL handshake on the client port.
      # The default is SCRAM-SHA-256; PLAIN is also enabled so clients
      # that haven't yet provisioned a SCRAM credential can still connect
      # during the first-time bootstrap. PLAIN over a PLAINTEXT transport
      # is dev-only — production overrides to SASL_SSL + SCRAM-only.
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN,SCRAM-SHA-256
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_LISTENER_NAME_SASL_PLAINTEXT_SASL_ENABLED_MECHANISMS: PLAIN,SCRAM-SHA-256
      KAFKA_LISTENER_NAME_SASL_PLAINTEXT_PLAIN_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_SASL_USERNAME:?KAFKA_SASL_USERNAME must be set}"
        password="${KAFKA_SASL_PASSWORD:?KAFKA_SASL_PASSWORD must be set}"
        user_${KAFKA_SASL_USERNAME}="${KAFKA_SASL_PASSWORD}";
      KAFKA_LISTENER_NAME_SASL_PLAINTEXT_SCRAM__2DSHA__2D256_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.scram.ScramLoginModule required;
      # Disable anonymous access — every client must authenticate.
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_SUPER_USERS: "User:${KAFKA_SASL_USERNAME:?KAFKA_SASL_USERNAME must be set}"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL",
             "kafka-broker-api-versions --bootstrap-server localhost:9092 \
              --command-config /etc/kafka/secrets/client.properties || exit 1"]
      interval: 10s
      timeout:  5s
      retries:  5
    volumes:
      # client.properties carries the SASL credentials the healthcheck
      # uses — generated by launch/deploy/render_kafka_client_properties.sh
      # from KAFKA_SASL_USERNAME / KAFKA_SASL_PASSWORD before `up`.
      - ./secrets/kafka-client.properties:/etc/kafka/secrets/client.properties:ro
    # VULN-17: bind ONLY to 127.0.0.1 on the host. The broker is reachable
    # to other services in the compose network via the `kafka` hostname;
    # it MUST NOT be reachable from the host's external network interfaces.
    # Production deployments rely on VPC/security-group isolation in
    # addition to SASL_SSL — see launch/RUNBOOK.md.
    ports:
      - "127.0.0.1:9092:9092"
    mem_limit: 4g
    cpus: "2.0"

  # ── The indexer process itself ───────────────────────────────────────────
  indexer:
    image: phylanx/indexer:${PHYLANX_VERSION:?PHYLANX_VERSION must be set}
    restart: unless-stopped
    depends_on:
      kafka:        { condition: service_healthy }
      timescaledb:  { condition: service_healthy }
    environment:
      PHYLANX_NETWORK:      "${PHYLANX_NETWORK:-devnet}"
      PHYLANX_MAINNET_OK:   "${PHYLANX_MAINNET_OK:-}"
      SOLANA_RPC_URL:       "${SOLANA_RPC_URL:?SOLANA_RPC_URL must be set}"
      DATABASE_URL:         "postgres://phylanx_indexer:${TIMESCALE_PASSWORD}@timescaledb/phylanx"
      KAFKA_BOOTSTRAP:      "kafka:9092"
      # VULN-17: the indexer authenticates to the broker over SASL.
      # SASL_PLAINTEXT is for dev only — the production override switches
      # to SASL_SSL and points at the cluster's CA bundle. The
      # KafkaSecurityRefused guard in eventbus/kafka_security.py REFUSES
      # to start with these values unset against a production network.
      KAFKA_SECURITY_PROTOCOL: "${KAFKA_SECURITY_PROTOCOL:-SASL_PLAINTEXT}"
      KAFKA_SASL_MECHANISM:    "${KAFKA_SASL_MECHANISM:-SCRAM-SHA-256}"
      KAFKA_SASL_USERNAME:     "${KAFKA_SASL_USERNAME:?KAFKA_SASL_USERNAME must be set}"
      KAFKA_SASL_PASSWORD:     "${KAFKA_SASL_PASSWORD:?KAFKA_SASL_PASSWORD must be set}"
      # Production additionally exports KAFKA_SSL_CA_LOCATION /
      # KAFKA_SSL_CERTIFICATE_LOCATION / KAFKA_SSL_KEY_LOCATION; in dev
      # they are empty and the guard's WARNING fires once at start-up.
      KAFKA_SSL_CA_LOCATION:           "${KAFKA_SSL_CA_LOCATION:-}"
      KAFKA_SSL_CERTIFICATE_LOCATION:  "${KAFKA_SSL_CERTIFICATE_LOCATION:-}"
      KAFKA_SSL_KEY_LOCATION:          "${KAFKA_SSL_KEY_LOCATION:-}"
      LOG_LEVEL:            "INFO"
      METRICS_PORT:         "9090"
    ports:
      - "127.0.0.1:9090:9090"          # Prometheus scrape — local only
    mem_limit: 2g
    cpus: "2.0"

  # ── The read API — what Day 30 monitoring scrapes and runbooks curl ──────
  api:
    image: phylanx/api:${PHYLANX_VERSION:?PHYLANX_VERSION must be set}
    restart: unless-stopped
    depends_on:
      timescaledb:  { condition: service_healthy }
      indexer:      { condition: service_started }
    environment:
      # Day 30 network guard — refuses mainnet without explicit opt-in.
      PHYLANX_NETWORK:      "${PHYLANX_NETWORK:-devnet}"
      PHYLANX_MAINNET_OK:   "${PHYLANX_MAINNET_OK:-}"
      DATABASE_URL:         "postgres://phylanx_indexer:${TIMESCALE_PASSWORD}@timescaledb/phylanx"
      PHYLANX_API_PORT:     "8080"
      LOG_LEVEL:            "INFO"
      SCORING_ALGO_VERSION:    "${SCORING_ALGO_VERSION:-}"
      SCORING_WEIGHTS_VERSION: "${SCORING_WEIGHTS_VERSION:-}"
    ports:
      - "8080:8080"         # HTTP (Swagger /docs, /agents/*, /byzantine/*)
      - "9095:9090"         # Prometheus exposition (avoids 9090 clash)
    mem_limit: 1g
    cpus: "2.0"

  # ── Prometheus — local scrape so the cluster has metrics from day one ─────
  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    ports:
      - "9091:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    mem_limit: 1g


volumes:
  tsdb_data:
  prom_data:
