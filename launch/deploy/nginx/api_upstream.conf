# =============================================================================
# launch/deploy/nginx/api_upstream.conf — SPOF-#7+#9 mitigation.
#
# nginx in front of the API replicas. The upstream pool has three
# entries; nginx least-conn-balances new requests across them and
# automatically removes a replica that fails its active health check.
#
# WHY least_conn
# --------------
# round_robin (the default) does not adapt to per-request latency. The
# Phylanx API's `cluster_health` endpoint can take 100ms while
# `/health` takes <5ms; least_conn keeps the slow endpoints off a
# replica that is already busy serving them. The audit's load test
# baseline (`audit/load_tests/api_load.py`) is most stable under
# least_conn.
#
# WHY max_fails=3, fail_timeout=15s
# ---------------------------------
# Three consecutive failures within 15s remove the replica from the
# pool for 15s. Less aggressive than the default (1 failure / 10s) so
# a transient GC pause or DB blip does not flap. After 15s nginx
# re-attempts; if the replica is still failing, another 15s removal.
#
# WHY proxy_next_upstream
# -----------------------
# An idempotent GET that hit a failing replica is retried against the
# next one — the user sees a successful response. POST/PUT/DELETE are
# NOT retried (they may have already committed); the client sees the
# 502 and decides whether to retry. This matches the audit's
# at-least-once vs at-most-once contract: reads are at-least-once,
# writes are at-most-once.
#
# AUDITED
# -------
# audit/spof_check.py verifies this file exists, declares >= 3 upstream
# servers, sets `proxy_next_upstream`, and uses `least_conn`. A
# regression that downgrades any of those fails the gate.
# =============================================================================

upstream phylanx_api {
    least_conn;

    # SPOF-#7+#9 floor: three independent API replicas. Each one runs
    # the same image, with the same DATABASE_URL, behind the load
    # balancer. The trio is the smallest configuration where one
    # replica can fail AND nginx can still serve a tie-break.
    server api-1:8080 max_fails=3 fail_timeout=15s;
    server api-2:8080 max_fails=3 fail_timeout=15s;
    server api-3:8080 max_fails=3 fail_timeout=15s;

    keepalive 32;
}

server {
    listen 8080 default_server;
    server_name _;

    # Reject suspiciously large request bodies before they hit the API.
    # The audit's biggest write payload is a few KiB; 64 KiB is the
    # generous ceiling.
    client_max_body_size 64k;

    # Forward the real client IP. The rate limiter in api/rate_limit.py
    # uses this header; without it every request looks like it came
    # from the nginx pod and the rate limit is meaningless.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Active failover on idempotent reads. The list excludes POST/PUT/
    # DELETE failures because we cannot prove they didn't commit.
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
    proxy_next_upstream_timeout 5s;

    # Conservative timeouts. The dashboard's slowest endpoint
    # (`/byzantine/recovery`) returns within ~3s under load; 10s is
    # generous without letting a stuck replica wedge the request.
    proxy_connect_timeout 2s;
    proxy_send_timeout    10s;
    proxy_read_timeout    10s;

    # ── nginx's own health probe — what the operator curls ────────────────
    location = /lb-health {
        access_log off;
        return 200 "ok\n";
    }

    # ── Pass everything else to the API pool ──────────────────────────────
    location / {
        proxy_pass http://phylanx_api;
    }
}
