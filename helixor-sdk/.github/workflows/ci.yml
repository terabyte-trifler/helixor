name: SDK CI

on:
  push:
    paths: ["helixor-sdk/**"]
  pull_request:
    paths: ["helixor-sdk/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: helixor-sdk } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: "helixor-sdk/package-lock.json" }

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: helixor-client-dist-${{ github.sha }}
          path: helixor-sdk/dist/
