[workspace]
members  = ["programs/health-oracle"]
resolver = "2"

[workspace.dependencies]
anchor-lang = { version = "0.32.1", features = ["init-if-needed"] }

# Panic on integer overflow in both dev and release — never silently wrap.
# This is load-bearing: balance checks that silently wrap are the #1 cause
# of fund-loss bugs in Solana programs.
[profile.release]
overflow-checks = true
lto             = "thin"
codegen-units   = 1
opt-level       = 3

[profile.dev]
overflow-checks = true
