[workspace]
members  = ["programs/*"]
resolver = "2"

[patch.crates-io]
# Anchor 0.30.1's IDL generator calls the old proc_macro2::Span::source_file()
# semver-exempt API, which no longer compiles on current Rust/proc-macro2.
# Keep Anchor pinned at 0.30.1, but patch that one call to use
# local_file()/file() so normal `anchor build` can generate IDLs.
anchor-syn = { path = "vendor/anchor-syn-0.30.1" }

[profile.release]
# Hardening — same Day-13 standard
overflow-checks = true
lto             = "fat"
codegen-units   = 1
