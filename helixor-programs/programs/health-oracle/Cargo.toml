[package]
name        = "health-oracle"
version     = "0.3.0"
edition     = "2021"
description = "Helixor V2 health-oracle — Day 3 adds commit_baseline + registration migration"

[lib]
crate-type = ["cdylib", "lib"]
name       = "health_oracle"

[features]
default      = []
no-entrypoint = []
no-idl        = []
no-log-ix-name = []
cpi          = ["no-entrypoint"]

[dependencies]
anchor-lang = "1.0.2"
# Day 19: health-oracle CPI-calls certificate_issuer.issue_certificate.
# The `cpi` feature pulls in the callee's auto-generated CPI module
# without its entrypoint (no-entrypoint), so it links as a library.
certificate-issuer = { path = "../certificate-issuer", features = ["cpi"] }
solana-instructions-sysvar = "3.0.1"
