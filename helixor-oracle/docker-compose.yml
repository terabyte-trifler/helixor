version: "3.9"

# Day 8 docker-compose ADDITION — adds 'api' service alongside Day 4-7 services.
# Replace your existing docker-compose.yml with this one.

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     helixor
      POSTGRES_PASSWORD: helixor
      POSTGRES_DB:       helixor
    # Use 55433 on the host so we don't collide with any local Postgres.
    ports: ["55433:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helixor -d helixor"]
      interval: 5s
      timeout: 3s
      retries: 5

  webhook_receiver:
    build: .
    depends_on: { postgres: { condition: service_healthy } }
    environment: &shared
      DATABASE_URL:                postgresql://helixor:helixor@postgres:5432/helixor
      HELIUS_API_KEY:              ${HELIUS_API_KEY:-changeme}
      HELIUS_WEBHOOK_URL:          ${HELIUS_WEBHOOK_URL:-https://example.com/webhook}
      HELIUS_WEBHOOK_AUTH_TOKEN:   ${HELIUS_WEBHOOK_AUTH_TOKEN:-changeme-make-it-32-chars-long}
      HEALTH_ORACLE_PROGRAM_ID:    ${HEALTH_ORACLE_PROGRAM_ID:-Cnn6AWzKD6NjwNZNsJnDYYYTTjt2C9Gow2TZoXzK3U5P}
      SOLANA_RPC_URL:              ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
    ports: ["8000:8000"]
    command: ["uvicorn", "indexer.webhook_receiver:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  agent_sync:
    build: .
    depends_on: { postgres: { condition: service_healthy } }
    environment: *shared
    command: ["python", "-m", "indexer.agent_sync"]
    restart: unless-stopped

  webhook_registrar:
    build: .
    depends_on: { postgres: { condition: service_healthy } }
    environment: *shared
    command: ["python", "-m", "indexer.webhook_registrar"]
    restart: unless-stopped

  reconciler:
    build: .
    depends_on: { postgres: { condition: service_healthy } }
    environment: *shared
    command: ["python", "-m", "indexer.reconciler"]
    restart: unless-stopped

  baseline_scheduler:
    build: .
    depends_on: { postgres: { condition: service_healthy } }
    environment: *shared
    command: ["python", "-m", "scoring.scheduler"]
    restart: unless-stopped

  epoch_runner:
    build: .
    depends_on: { postgres: { condition: service_healthy } }
    environment:
      <<: *shared
      ORACLE_KEYPAIR_PATH: ${ORACLE_KEYPAIR_PATH:-/app/keys/oracle-node.json}
    volumes:
      - ../helixor-programs/keys:/app/keys:ro
    command: ["python", "-m", "oracle.epoch_runner"]
    restart: unless-stopped

  # ── Day 8: REST API ──────────────────────────────────────────────────────
  api:
    build: .
    depends_on: { postgres: { condition: service_healthy } }
    environment: *shared
    ports: ["8001:8001"]
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8001"]
    restart: unless-stopped

volumes:
  pgdata:
