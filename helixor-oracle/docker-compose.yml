version: "3.9"

# Day 8 docker-compose ADDITION — adds 'api' service alongside Day 4-7 services.
# Replace your existing docker-compose.yml with this one.

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     helixor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local env}
      POSTGRES_DB:       helixor
    expose: ["5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helixor -d helixor"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgbouncer:
    image: bitnami/pgbouncer:1.23.1
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      POSTGRESQL_HOST:       postgres
      POSTGRESQL_PORT:       5432
      POSTGRESQL_USERNAME:   helixor
      POSTGRESQL_PASSWORD:   ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local env}
      POSTGRESQL_DATABASE:   helixor
      PGBOUNCER_PORT:        6432
      PGBOUNCER_AUTH_TYPE:   scram-sha-256
      PGBOUNCER_POOL_MODE:   transaction
      PGBOUNCER_MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-1000}
      PGBOUNCER_DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-25}
      PGBOUNCER_RESERVE_POOL_SIZE: ${PGBOUNCER_RESERVE_POOL_SIZE:-10}
    expose: ["6432"]
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$$POSTGRESQL_PASSWORD psql -h 127.0.0.1 -p 6432 -U helixor -d helixor -c 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    expose: ["6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  webhook_receiver:
    build: .
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment: &shared
      DATABASE_URL:                postgresql://helixor:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local env}@pgbouncer:6432/helixor
      DB_STATEMENT_CACHE_SIZE:     0
      REDIS_URL:                   redis://redis:6379/0
      REDIS_PREFIX:                ${REDIS_PREFIX:-helixor}
      RATE_LIMIT_CAPACITY:         ${RATE_LIMIT_CAPACITY:-100}
      RATE_LIMIT_REFILL_PER_SECOND: ${RATE_LIMIT_REFILL_PER_SECOND:-1.6666666667}
      RATE_LIMIT_FREE_CAPACITY:    ${RATE_LIMIT_FREE_CAPACITY:-300}
      RATE_LIMIT_PARTNER_CAPACITY: ${RATE_LIMIT_PARTNER_CAPACITY:-10000}
      RATE_LIMIT_TEAM_CAPACITY:    ${RATE_LIMIT_TEAM_CAPACITY:-50000}
      API_KEY_TIER_CACHE_SECONDS:  ${API_KEY_TIER_CACHE_SECONDS:-300}
      SCORE_CACHE_TTL_SECONDS:     ${SCORE_CACHE_TTL_SECONDS:-60}
      NEGATIVE_CACHE_TTL_SECONDS:  ${NEGATIVE_CACHE_TTL_SECONDS:-30}
      WEBHOOK_QUEUE_ENABLED:       ${WEBHOOK_QUEUE_ENABLED:-true}
      WEBHOOK_QUEUE_NAME:          ${WEBHOOK_QUEUE_NAME:-webhook_batches}
      WEBHOOK_WORKER_BATCH_SIZE:   ${WEBHOOK_WORKER_BATCH_SIZE:-100}
      WEBHOOK_WORKER_POLL_TIMEOUT_SECONDS: ${WEBHOOK_WORKER_POLL_TIMEOUT_SECONDS:-5}
      HELIUS_API_KEY:              ${HELIUS_API_KEY:?Set HELIUS_API_KEY in your local env}
      HELIUS_WEBHOOK_URL:          ${HELIUS_WEBHOOK_URL:?Set HELIUS_WEBHOOK_URL in your local env}
      HELIUS_WEBHOOK_AUTH_TOKEN:   ${HELIUS_WEBHOOK_AUTH_TOKEN:?Set HELIUS_WEBHOOK_AUTH_TOKEN in your local env}
      HEALTH_ORACLE_PROGRAM_ID:    ${HEALTH_ORACLE_PROGRAM_ID:-Cnn6AWzKD6NjwNZNsJnDYYYTTjt2C9Gow2TZoXzK3U5P}
      SOLANA_RPC_URL:              ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      MONITORING_ADMIN_TOKEN:      ${MONITORING_ADMIN_TOKEN:?Set MONITORING_ADMIN_TOKEN in your local env}
      API_CORS_ORIGINS:            ${API_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      TRUST_X_FORWARDED_FOR:       ${TRUST_X_FORWARDED_FOR:-false}
      TRUSTED_PROXY_IPS:           ${TRUSTED_PROXY_IPS:-127.0.0.1,::1}
    ports: ["8000:8000"]
    command: ["uvicorn", "indexer.webhook_receiver:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  webhook_worker:
    build: .
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment: *shared
    command: ["python", "-m", "indexer.webhook_worker"]
    restart: unless-stopped

  agent_sync:
    build: .
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment: *shared
    command: ["python", "-m", "indexer.agent_sync"]
    restart: unless-stopped

  webhook_registrar:
    build: .
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment: *shared
    command: ["python", "-m", "indexer.webhook_registrar"]
    restart: unless-stopped

  reconciler:
    build: .
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment: *shared
    command: ["python", "-m", "indexer.reconciler"]
    restart: unless-stopped

  baseline_scheduler:
    build: .
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment: *shared
    command: ["python", "-m", "scoring.scheduler"]
    restart: unless-stopped

  epoch_runner:
    build: .
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      <<: *shared
      ORACLE_KEYPAIR_PATH: ${ORACLE_KEYPAIR_PATH:-/app/keys/oracle-node.json}
    volumes:
      - ../helixor-programs/keys:/app/keys:ro
    command: ["python", "-m", "oracle.epoch_runner"]
    restart: unless-stopped

  # ── Day 8: REST API ──────────────────────────────────────────────────────
  api:
    build: .
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment: *shared
    ports: ["8001:8001"]
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8001"]
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
