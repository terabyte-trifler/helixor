# =============================================================================
# /etc/logrotate.d/helixor
#
# journald handles structured logs but if any subprocess writes plain files,
# we cap them. Install with:
#   sudo cp deploy/logrotate.conf /etc/logrotate.d/helixor
# =============================================================================

/var/log/helixor/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    su helixor helixor
    create 0640 helixor helixor
}
